    @media print {
        body {

            padding: 0;

        .container {

            padding: 1mm;
        }
        .no-print {
            display: none;

        .grid, .soal {

    * {

    }
    
    body {

    .container {

        width: 100%;

    }
    
    .header {

        margin-bottom: 3mm;
        border-bottom: 0.2mm solid black;

        font-weight: bold;
    }

    }
    
    .info {

        text-align: center;
        margin-bottom: 5mm;
    }
    
    .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 2mm 3mm;
    }
    
    .soal {
        text-align: center;
    }
    
    .soal-img {
        width: 14mm;
        height: 14mm;
        border: 0.2mm solid gray;
        margin: 0 auto 1.5mm auto;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f9f9f9;
    }
    
    .soal-img img {
        max-width: 11mm;
        max-height: 11mm;
    }
    
    .soal-nomor {
        font-size: 2.8mm;
    }
    
    .jawaban-line {
        border-bottom: 0.2mm solid black;
        width: 15mm;
        display: inline-block;
    }
    
    button {
        margin-top: 20px;
        padding: 8px 16px;
    }
</style>
