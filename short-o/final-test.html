<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Final Test - Short O</title>
<style>
    @media print {
        body {
            margin: 0;
            padding: 0;
        }
        .container {
            width: 100%;
            padding: 1mm;
        }
        .no-print {
            display: none;
        }
        .grid, .soal {
            page-break-inside: avoid;
        }
    }
    
    * {
        box-sizing: border-box;
    }
    
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background: white;
        display: flex;
        justify-content: center;
    }
    
    .container {
        max-width: 190mm;
        width: 100%;
        background: white;
    }
    
    .header {
        text-align: center;
        margin-bottom: 3mm;
        border-bottom: 0.2mm solid black;
        padding-bottom: 1mm;
    }
    
    .title {
        font-size: 4.5mm;
        font-weight: bold;
    }
    
    .subtitle {
        font-size: 3mm;
    }
    
    .info {
        font-size: 2.8mm;
        text-align: center;
        margin-bottom: 5mm;
    }
    
    .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 2mm 3mm;
    }
    
    .soal {
        text-align: center;
    }
    
    .soal-img {
        width: 14mm;
        height: 14mm;
        border: 0.2mm solid gray;
        margin: 0 auto 1.5mm auto;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f9f9f9;
    }
    
    .soal-img img {
        max-width: 11mm;
        max-height: 11mm;
    }
    
    .soal-nomor {
        font-size: 2.8mm;
    }
    
    .jawaban-line {
        border-bottom: 0.2mm solid black;
        width: 15mm;
        display: inline-block;
    }
    
    button {
        margin-top: 20px;
        padding: 8px 16px;
    }
</style>
</head>
