<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Final Test - Short A Part 2</title>
<style>
    @media print {
        body {
            margin: 0;
            padding: 0;
        }
        .container {
            width: 100%;
            padding: 1mm;
        }
        .no-print {
            display: none;
        }
        .grid, .soal {
            page-break-inside: avoid;
        }
    }
    
    * {
        box-sizing: border-box;
    }
    
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background: white;
        display: flex;
        justify-content: center;
    }
    
    .container {
        max-width: 190mm;
        width: 100%;
        background: white;
    }
    
    .header {
        text-align: center;
        margin-bottom: 3mm;
        border-bottom: 0.2mm solid black;
        padding-bottom: 1mm;
    }
    
    .title {
        font-size: 4.5mm;
        font-weight: bold;
    }
    
    .subtitle {
        font-size: 3mm;
    }
    
    .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 2mm 3mm;
    }
    
    .soal {
        text-align: center;
    }
    
    .soal-img {
        width: 14mm;
        height: 14mm;
        border: 0.2mm solid gray;
        margin: 0 auto 1.5mm auto;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f9f9f9;
    }
    
    .soal-img img {
        max-width: 11mm;
        max-height: 11mm;
    }
    
    .soal-nomor {
        font-size: 2.8mm;
    }
    
    .jawaban-line {
        border-bottom: 0.2mm solid black;
        width: 15mm;
        display: inline-block;
    }
    
    button {
        margin-top: 20px;
        padding: 8px 16px;
    }
</style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">Final Test</div>
            <div class="subtitle">Short A – Part 2</div>
        </div>
        
        <div class="grid">
            <!-- 1. can -->
            <div class="soal">
                <div class="soal-nomor">1.</div>
                <div class="soal-img"><img src="images/can.png" alt="can"></div>
                <div class="soal-jawab">→ <span class="jawaban-line"></span></div>
            </div>
            <!-- 2. fan -->
            <div class="soal">
                <div class="soal-nomor">2.</div>
                <div class="soal-img"><img src="images/fan.png" alt="fan"></div>

            </div>
            <!-- 3. man -->

            </div>
            <!-- 4. hat -->
            <div class="soal">

            <!-- 5. mat -->

            </div>
            <!-- 7. man on mat -->
            <div class="soal">

                <div class="soal-img"><img src="images/man-on-mat.png" alt="man on mat"></div>

            </div>
            <!-- 8. cap -->

            </div>
            <!-- 11. bag -->

            </div>

            </div>

                <div class="soal-jawab">→ <span class="jawaban-line"></span></div>
            </div>
            <!-- 14. jam -->
            <div class="soal">
                <div class="soal-nomor">14.</div>
                <div class="soal-img"><img src="images/jam.png" alt="jam"></div>
                <div class="soal-jawab">→ <span class="jawaban-line"></span></div>
            </div>
            <!-- 15. yam -->
            <div class="soal">
                <div class="soal-nomor">15.</div>
                <div class="soal-img"><img src="images/yam.png" alt="yam"></div>
                <div class="soal-jawab">→ <span class="jawaban-line"></span></div>
            </div>
        </div>
    </div>
    
    <div class="no-print" style="text-align: center;">
        <button onclick="window.print()">🖨️ Print / Save as PDF</button>
    </div>
</body>
</html>
