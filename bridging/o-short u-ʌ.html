    @media print {

    }
    
    .grid {

        grid-template-columns: repeat(4, 1fr);
        gap: 2mm 3mm;
    }
    
    .soal {
        text-align: center;
    }
    
    .soal-img {
        width: 14mm;
        height: 14mm;
        border: 0.2mm solid gray;
        margin: 0 auto 1.5mm auto;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f9f9f9;

    .soal-img img {

    }
    
    .soal-nomor {

    }
    
    .jawaban-line {
        border-bottom: 0.2mm solid black;
        width: 15mm;

    }
    
    button {

</style>
