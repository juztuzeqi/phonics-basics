    @media print {

    }
    
    .grid {

        gap: 2mm 3mm;
    }
    
    .soal {
        text-align: center;
    }
    
    .soal-img {

        height: 14mm;
        border: 0.2mm solid gray;
        margin: 0 auto 1.5mm auto;
        display: flex;
        align-items: center;

    .soal-img img {

    .soal-nomor {

    }
    
    .jawaban-line {
        border-bottom: 0.2mm solid black;
        width: 15mm;

    button {

</style>
