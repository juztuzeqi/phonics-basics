<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Final Test - Short A Part 1</title>
    <style>
        /* Print styling */
        @media print {
            body {
                margin: 0;
                padding: 0;
            }
            .container {
                padding: 1cm;
                margin: 0;
            }
            .no-print {
                display: none;
            }
        }
        
        /* Screen styling */
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #e0e0e0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 210mm; /* A4 width */
            background: white;
            padding: 1cm;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid black;
            padding-bottom: 10px;
        }
        
        .title {
            font-size: 22px;
            font-weight: bold;
        }
        
        .subtitle {
            font-size: 14px;
            margin-top: 5px;
        }
        
        .info {
            font-size: 12px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        /* Grid 4 kolom */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px 20px;
            margin-bottom: 30px;
        }
        
        .soal {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        
        .soal-img {
            width: 80px;
            height: 80px;
            border: 1px solid #aaa;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9f9f9;
            margin-bottom: 8px;
        }
        
        .soal-img img {
            max-width: 70px;
            max-height: 70px;
        }
        
        .soal-nomor {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        
        .soal-jawab {
            font-size: 12px;
            margin-top: 5px;
        }
        
        .jawaban-line {
            border-bottom: 1px solid black;
            width: 60px;
            display: inline-block;
        }
        
        .score-box {
            border: 2px solid black;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            margin-top: 20px;
        }
        
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">Final Test</div>
            <div class="subtitle">Short A – Part 1</div>
        </div>
                
        <div class="grid">
            <!-- 1. cat -->
            <div class="soal">
                <div class="soal-nomor">1.</div>
                <div class="soal-img"><img src="images/cat.png" alt="cat"></div>
                <div class="soal-jawab">→ <span class="jawaban-line"></span></div>
            </div>
            <!-- 2. rat -->
            <div class="soal">

            <!-- 3. bat -->

            <!-- 7. man -->

            <!-- 8. van -->

            </div>
            <!-- 11. cat in pan -->

            </div>
            <!-- 12. bad -->

                <div class="soal-img"><img src="images/bad.png" alt="bad"></div>

            </div>

            </div>
            <!-- 14. sad -->

            </div>

            <div class="soal">

                <div class="soal-img"><img src="images/sad-cat.png" alt="sad cat"></div>

            </div>
        </div>
    </div>
    
    <div class="no-print" style="text-align: center;">
        <button onclick="window.print()">🖨️ Print / Save as PDF</button>
    </div>
</body>
</html>
