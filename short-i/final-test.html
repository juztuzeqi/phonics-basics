<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Final Test - Short I</title>
<style>
    @media print {
        body {
            margin: 0;
            padding: 0;
        }
        .container {
            width: 100%;
            padding: 1mm;
        }
        .no-print {
            display: none;
        }
        .grid, .soal {
            page-break-inside: avoid;
        }
    }
    
    * {
        box-sizing: border-box;
    }
    
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background: white;
        display: flex;
        justify-content: center;
    }
    
    .container {
        max-width: 190mm;
        width: 100%;
        background: white;
    }
    
    .header {
        text-align: center;
        margin-bottom: 3mm;
        border-bottom: 0.2mm solid black;
        padding-bottom: 1mm;
    }
    
    .title {
        font-size: 4.5mm;
        font-weight: bold;
    }
    
    .subtitle {
        font-size: 3mm;
    }
    
    .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 2mm 3mm;
    }
    
    .soal {
        text-align: center;
    }
    
    .soal-img {
        width: 14mm;
        height: 14mm;
        border: 0.2mm solid gray;
        margin: 0 auto 1.5mm auto;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f9f9f9;
    }
    
    .soal-img img {
        max-width: 11mm;
        max-height: 11mm;
    }
    
    .soal-nomor {
        font-size: 2.8mm;
    }
    
    .jawaban-line {
        border-bottom: 0.2mm solid black;
        width: 15mm;
        display: inline-block;
    }
    
    button {
        margin-top: 20px;
        padding: 8px 16px;
    }
</style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">Final Test</div>
            <div class="subtitle">Short I</div>
        </div>
        
        <div class="grid">
            <!-- 1. big -->
            <div class="soal">
                <div class="soal-nomor">1.</div>
                <div class="soal-img"><img src="images/big.png" alt="big"></div>
                <div class="soal-jawab">→ <span class="jawaban-line"></span></div>
            </div>
            <!-- 2. wig -->
            <div class="soal">
                <div class="soal-nomor">2.</div>
                <div class="soal-img"><img src="images/wig.png" alt="wig"></div>
                <div class="soal-jawab">→ <span class="jawaban-line"></span></div>
            </div>
            <!-- 3. big wig -->
            <div class="soal">
                <div class="soal-nomor">3.</div>
                <div class="soal-img"><img src="images/big-wig.png" alt="big wig"></div>
                <div class="soal-jawab">→ <span class="jawaban-line"></span></div>
            </div>
            <!-- 4. pin -->
            <div class="soal">
                <div class="soal-nomor">4.</div>
                <div class="soal-img"><img src="images/pin.png" alt="pin"></div>
                <div class="soal-jawab">→ <span class="jawaban-line"></span></div>
            </div>
            <!-- 5. in -->
            <div class="soal">
                <div class="soal-nomor">5.</div>
                <div class="soal-img"><img src="images/in.png" alt="in"></div>
                <div class="soal-jawab">→ <span class="jawaban-line"></span></div>
            </div>
            <!-- 6. bin -->
            <div class="soal">
                <div class="soal-nomor">6.</div>
                <div class="soal-img"><img src="images/bin.png" alt="bin"></div>
                <div class="soal-jawab">→ <span class="jawaban-line"></span></div>
            </div>
            <!-- 7. sit on bin -->
            <div class="soal">
                <div class="soal-nomor">7.</div>
                <div class="soal-img"><img src="images/sit-on-bin.png" alt="sit on bin"></div>
                <div class="soal-jawab">→ <span class="jawaban-line"></span></div>
            </div>
            <!-- 8. sit on pin (Ouch!) -->
            <div class="soal">
                <div class="soal-nomor">8.</div>
                <div class="soal-img"><img src="images/sit-on-pin-ouch.png" alt="sit on pin ouch"></div>
                <div class="soal-jawab">→ <span class="jawaban-line"></span></div>
            </div>
            <!-- 9. lip -->
            <div class="soal">
                <div class="soal-nomor">9.</div>
                <div class="soal-img"><img src="images/lip.png" alt="lip"></div>
                <div class="soal-jawab">→ <span class="jawaban-line"></span></div>
            </div>
            <!-- 10. zip my lip -->
            <div class="soal">
                <div class="soal-nomor">10.</div>
                <div class="soal-img"><img src="images/zip-my-lip.png" alt="zip my lip"></div>
                <div class="soal-jawab">→ <span class="jawaban-line"></span></div>
            </div>
            <!-- 11. kid -->
            <div class="soal">
                <div class="soal-nomor">11.</div>
                <div class="soal-img"><img src="images/kid.png" alt="kid"></div>
                <div class="soal-jawab">→ <span class="jawaban-line"></span></div>
            </div>
            <!-- 12. kid in bin -->
            <div class="soal">
                <div class="soal-nomor">12.</div>
                <div class="soal-img"><img src="images/kid-in-bin.png" alt="kid in bin"></div>
                <div class="soal-jawab">→ <span class="jawaban-line"></span></div>
            </div>
            <!-- 13. fix -->
            <div class="soal">
                <div class="soal-nomor">13.</div>
                <div class="soal-img"><img src="images/fix.png" alt="fix"></div>
                <div class="soal-jawab">→ <span class="jawaban-line"></span></div>
            </div>
            <!-- 14. mix -->
            <div class="soal">
                <div class="soal-nomor">14.</div>
                <div class="soal-img"><img src="images/mix.png" alt="mix"></div>
                <div class="soal-jawab">→ <span class="jawaban-line"></span></div>
            </div>
            <!-- 15. fix the mix -->
            <div class="soal">
                <div class="soal-nomor">15.</div>
                <div class="soal-img"><img src="images/big-bag.png" alt="big bag"></div>
                <div class="soal-jawab">→ <span class="jawaban-line"></span></div>
            </div>
        </div>
    </div>
    
    <div class="no-print" style="text-align: center;">
        <button onclick="window.print()">🖨️ Print / Save as PDF</button>
    </div>
</body>
</html>
